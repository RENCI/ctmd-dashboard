---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Values.redis.name }}
  name: {{ .Values.redis.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.redis.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.redis.name }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      {{- if .Values.redis.publicRepository }}
      - image: redis:{{ .Values.redis.tag }}
      {{- else }}
      - image: {{ .Values.images.repository }}/{{ .Values.redis.name }}:{{ .Values.redis.tag | default .Chart.AppVersion }}
      {{- end }}
        name: {{ .Values.redis.name }}
        {{- with .Values.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: 6379
        resources: {}


--- 
apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ .Values.redis.name }}
  name: {{ .Values.redis.name }}
spec:
  ports:
  - port: 6379
    protocol: TCP
    targetPort: 6379
  selector:
    app: {{ .Values.redis.name }}
